packages:
  - "packages/*"
  - "apps/*"
  - "tools/*"

# Single source of truth for shared dependency versions across the fleet.
# Workstream packages reference these with `"dep": "catalog:"`.
catalog:
  typescript: ^5.6.3
  tsx: ^4.19.2
  vitest: ^2.1.9
  "@vitest/coverage-v8": ^2.1.9
  eslint: ^9.15.0
  typescript-eslint: ^8.16.0
  eslint-plugin-jsdoc: ^50.6.0
  eslint-plugin-tsdoc: ^0.4.0
  zod: ^3.23.8
